SAMPLE_PROTOCOL: >
  DPPC bilayers were prepared by thoroughly mixing lipid (50 wt %) and water (50 wt %). 
  Approximately 200-500 mg of liquid crystalline phase was used for measuring powder type spectra. 
  Samples were sealed in ampoules and equilibrated above the phase transition temperature.


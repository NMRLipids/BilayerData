REAGENT_SOURCES:
  POPC: >
    alpha- and beta-deuterated POPC synthesized in-house from PA (Avanti Polar
    Lipids, Birmingham, AL, USA) following the method of Harbison and Griffin (1984).
    Deuterated choline synthesized as described in Gally et al. (1975) and
    Seelig and Gally (1976).
  POPG: Avanti Polar Lipids, Birmingham, AL, USA
  H2O: Deuterium-depleted water
SAMPLE_PROTOCOL: >
  Mixtures of head group deuterated POPC and POPG were prepared by pipetting
  corresponding volumes of concentrated stock solutions (10 mg/ml in
  dichloromethane/methanol) into NMR measuring tubes. The solvent was evaporated
  and lipids were dried under high vacuum (under P2O5) for several hours.
  Phospholipids were dispersed at room temperature in 20 mM Hepes (pH 7.4)
  buffer containing 150 mM NaCl. Buffer was prepared with deuterium-depleted
  water to minimize isotropic 2H-NMR signals. Lipid/buffer ratio was 1:2 (%w/%v).
NMR:
  INSTRUMENT: Bruker-Spektrospin CXP 300, 46.1 MHz for 2H, 121.48 MHz for 31P
  METHOD: 2H:QE
  SIGN_MEASURED: NONE
  T_RF_HEATING: UNKNOWN
  DETAILS: >
    2H NMR spectra measured using quadrupole echo technique (Davis et al., 1976).
    90 degree pulses of 3.5-4.0 us with echo separation of 30 us.
    4K data points, quadrature phase detection, spectral width of 50 kHz.
    Recycle delay of at least 7 T1.
    Alpha order parameter of POPC taken from Fig. 5A (alpha-deuterated POPC).
    Beta order parameter of POPC taken from Fig. 5B (beta-deuterated POPC).
    Also references Fig. 4 in Macdonald and Seelig, Biochemistry 26 (1987) p. 1231-1240.


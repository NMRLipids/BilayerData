SAMPLE_PROTOCOL: >
  Mixed POPC/POPG lipid samples were prepared and hydrated under excess water
  conditions to form fully hydrated multilamellar vesicles. Deuterium NMR
  measurements were performed to determine segmental order parameters of lipid
  acyl chains.

  Lipids purified by TLC and column chromatography.
SAMPLE_PROTOCOL: |
  Lipids were dissolved in chloroform, dried under argon, and lyophilized.
  Samples were hydrated with deuterium-depleted water (~200 µL for ~35 mg lipid),
  followed by freeze–thaw–vortex cycles to form multilamellar vesicles.
